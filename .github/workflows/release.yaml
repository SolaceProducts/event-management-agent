name: Release
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Default version to use when preparing a release."
        required: true
        default: "A.B.C"
      developmentVersion:
        description: "Default version to use for new local working copy (the next version after version A.B.C)."
        required: true
        default: "X.Y.Z-SNAPSHOT"
      dry_run:
        description: "Dry run: run the readiness check end-to-end, skip the actual mvn release commit/push and the entire publish job (no GitHub Release, no ECR retag, no manifest DB write). Use for validating the workflow without altering the repo or registries."
        type: boolean
        required: false
        default: false
      git_ref:
        description: "Branch / tag / SHA the readiness check should scan. Leave empty to scan github.sha (the ref this workflow runs on). Set to 'main' to always validate against the latest main HEAD, regardless of which ref triggered the workflow. Only affects the readiness scans — maven_release and publish always use github.sha."
        type: string
        required: false
        default: ""

permissions:
  contents: write              # For git commits/tags created by maven-release-plugin
  packages: write              # For package publishing
  pull-requests: write         # For FOSSA PR comments (via release-readiness-check)
  actions: read                # Required by release-readiness-check reusable workflow
  issues: write                # For github-script admin-bypass check (via release-readiness-check)
  checks: write                # For FOSSA/Guardian status checks (via release-readiness-check)
  statuses: write              # For FOSSA/Guardian commit status (via release-readiness-check)
  id-token: write              # OIDC token for Guardian/FOSSA/Prisma (via release-readiness-check)

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Reject git_ref without dry_run
        if: ${{ inputs.git_ref != '' && !fromJSON(inputs.dry_run) }}
        run: |
          echo "::error::'git_ref' is set ('${{ inputs.git_ref }}') but 'dry_run' is false. This combination is unsafe: readiness scans would validate the override ref while maven_release / publish operate on github.sha. Re-run with dry_run=true (for testing) or clear git_ref (for a real release from github.sha)."
          exit 1

  release_readiness:
    name: Release Readiness
    # Runs FOSSA + Prisma + SonarQube hotspots + Guardian gate against
    # the current commit before we let Maven cut the release. The
    # reusable workflow's prisma-scan job carries `environment: prod`,
    # so the first manual approval happens there.
    needs: validate-inputs
    uses: ./.github/workflows/release-readiness-check.yaml
    with:
      git_ref: ${{ inputs.git_ref }}
    secrets: inherit

  maven_release:
    name: Maven Release
    needs: release_readiness
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      tag: ${{ steps.set_version.outputs.tag }}

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      - name: Pre-Release Check - Version
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method GET /repos/${{github.repository}}/releases -f sort=updated -f direction=asc > releases.json
          release_version_exists=$(jq -r --arg RELEASE_VERSION v${{ github.event.inputs.releaseVersion }} '.[].name|select(.|test($RELEASE_VERSION))'  releases.json)
          if [[ ! -z "$release_version_exists" ]]; then
                echo "Version ${{ github.event.inputs.releaseVersion }} has been previously released. Please change release version."
                exit 1
          else
                echo "New version: ${{ github.event.inputs.releaseVersion }} going to be released!"
          fi
      - name: Prepare Maven Settings
        env:
          MAVEN_REPO_SERVER_USERNAME: "${{ github.actor }}"
          MAVEN_REPO_SERVER_PASSWORD: "${{ secrets.GITHUB_TOKEN }}"
          MAVEN_REPO_SERVER_PRIVATE_KEY: "~/.ssh/id_rsa"
          SSH_PRIVATE_KEY: "${{ secrets.COMMIT_KEY }}"
        run: cd .github/workflows/release_scripts && ./setup-ssh.sh
      - name: Set Release Configs
        run: |
          export SKIP_FLAGS_NON_UNIT_TESTS="-Dcheckstyle.skip -Dpmd.skip -Dcpd.skip -Dfindbugs.skip -Dspotbugs.skip"
          echo "SKIP_FLAGS_NON_UNIT_TESTS=$SKIP_FLAGS_NON_UNIT_TESTS" >> $GITHUB_ENV
          echo "SKIP_FLAGS_ALL_TESTS=$SKIP_FLAGS_NON_UNIT_TESTS -Dmaven.test.skip=true" >> $GITHUB_ENV
      - name: Clean before release
        run: mvn clean --file service/pom.xml
      - name: Maven Release
        if: ${{ !fromJSON(inputs.dry_run) }}
        run: mvn release:prepare release:perform -B --file service/pom.xml -DreleaseVersion=${{ github.event.inputs.releaseVersion }} -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }}
      - name: Maven Release (DRY RUN — skipped)
        if: ${{ fromJSON(inputs.dry_run) }}
        run: |
          echo "::warning::DRY RUN — Maven release skipped. Would have executed:"
          echo "  mvn release:prepare release:perform -B --file service/pom.xml \\"
          echo "    -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \\"
          echo "    -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }}"
          echo ""
          echo "Side effects that would have occurred:"
          echo "  - Commit pom.xml version bumps to ${{ github.event.inputs.releaseVersion }} (release) and ${{ github.event.inputs.developmentVersion }} (next snapshot)"
          echo "  - Create + push tag v${{ github.event.inputs.releaseVersion }} to origin"
          echo "  - Deploy artifacts via mvn deploy"

      - name: Set Version Output
        id: set_version
        run: |
          echo "version=${{ github.event.inputs.releaseVersion }}" >> $GITHUB_OUTPUT
          echo "tag=v${{ github.event.inputs.releaseVersion }}" >> $GITHUB_OUTPUT

  publish:
    name: Publish Release
    needs: maven_release
    # Skip the entire publish job on a dry run — the publish job is where
    # the GitHub release, ECR retag, and manifest DB write happen, and the
    # checkout step depends on the tag that maven_release would have pushed
    # (which doesn't exist on a dry run).
    if: ${{ needs.maven_release.result == 'success' && !fromJSON(inputs.dry_run) }}
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          ref: ${{ needs.maven_release.outputs.tag }}
      - name: Changelog
        uses: Bullrich/generate-release-changelog@master
        id: Changelog
        env:
          REPO: ${{ github.repository }}
      - name: Debug - List JAR files
        run: |
          echo "Listing all JAR files in target directories:"
          find . -name "*.jar" | grep "target"
      - name: Create GitHub Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: "${{ needs.maven_release.outputs.tag }}"
          artifacts: "**/application/target/event-management-agent-${{ needs.maven_release.outputs.version }}.jar"
          generateReleaseNotes: true
          makeLatest: true
          body: ${{ steps.Changelog.outputs.changelog }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355 # v2.2.0
        with:
          aws-access-key-id: ${{ secrets.EMA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.EMA_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.EMA_AWS_DEFAULT_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@2f9f10ea3fa2eed41ac443fee8bfbd059af2d0a4 # v1.6.0
      - name: ECR Docker Image Release
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name ${{ github.event.repository.name }} \
          --image-ids imageTag=main --region ${{ secrets.EMA_AWS_DEFAULT_REGION }} --output json \
          | jq --raw-output '.images[].imageManifest')

          aws ecr put-image --repository-name ${{ github.event.repository.name }} \
            --image-tag ${{ needs.maven_release.outputs.version }} \
            --image-manifest "$MANIFEST" --region ${{ secrets.EMA_AWS_DEFAULT_REGION }}
      - name: Update Release Manifest DB
        run: |
          export squad="event-portal"
          export repository="event-management-agent"
          export release_tag=production
          export version=${{ needs.maven_release.outputs.version }}
          export release_version=${{ needs.maven_release.outputs.version }}
          export image_tag=${{ needs.maven_release.outputs.version }}
          export chart_version="n/a"
          export sha=${{ github.sha }}
          ./.github/workflows/release_scripts/update_release_manifest.sh

  dry-run-summary:
    name: Dry Run Summary
    needs: [release_readiness, maven_release]
    # Replaces the publish job on a dry run so the user gets a clear
    # readable summary of what would have happened in a real release.
    # Runs even if maven_release failed for non-Maven reasons (checkout,
    # version-already-released check, etc.) so the summary is still
    # produced.
    if: ${{ !cancelled() && fromJSON(inputs.dry_run) }}
    runs-on: ubuntu-latest
    steps:
      - name: Report dry-run results
        env:
          VERSION: ${{ github.event.inputs.releaseVersion }}
          TAG: v${{ github.event.inputs.releaseVersion }}
          REPO_NAME: ${{ github.event.repository.name }}
          READINESS_RESULT: ${{ needs.release_readiness.result }}
          FOSSA_STATUS: ${{ needs.release_readiness.outputs.fossa_status }}
          PRISMA_STATUS: ${{ needs.release_readiness.outputs.prisma_status }}
          SONAR_STATUS: ${{ needs.release_readiness.outputs.sonarqube_hotspots_status }}
          GUARDIAN_STATUS: ${{ needs.release_readiness.outputs.guardian_status }}
          MAVEN_RELEASE_RESULT: ${{ needs.maven_release.result }}
        run: |
          {
            echo "## Dry Run Summary"
            echo ""
            echo "Scanned commit: \`${{ github.sha }}\`"
            echo "Target release version: \`$VERSION\`"
            echo ""
            echo "### Readiness gates (overall: \`$READINESS_RESULT\`)"
            echo ""
            echo "- FOSSA: \`$FOSSA_STATUS\`"
            echo "- Prisma: \`$PRISMA_STATUS\`"
            echo "- SonarQube Hotspots: \`$SONAR_STATUS\`"
            echo "- Guardian: \`$GUARDIAN_STATUS\`"
            echo ""
            echo "### Maven Release: \`$MAVEN_RELEASE_RESULT\` (actual release commands stubbed)"
            echo ""
            echo "### Publish steps that would have run for version \`$VERSION\`:"
            echo ""
            echo "1. **Create GitHub Release** \`$TAG\` with generated changelog + JAR artifact"
            echo "2. **ECR retag** \`$REPO_NAME:main\` → \`$REPO_NAME:$VERSION\`"
            echo "3. **Update Release Manifest DB** with squad=event-portal, version=$VERSION, sha=${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::DRY RUN — publish job skipped. See workflow run summary for details."
